<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      .brain-line { fill: none; stroke: #2563EB; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { fill: #2563EB; }
      .book { fill: none; stroke: #1E293B; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .text-behavior { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 48px; fill: #FFFFFF; }
      .text-school { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 48px; fill: #3B82F6; }
    </style>
  </defs>

  <!-- Open Book Base -->
  <path class="book" d="M 120 280 Q 250 290 250 310 Q 250 290 380 280 L 380 200 Q 250 210 250 230 Q 250 210 120 200 Z" transform="translate(0, 50)" />
  <path class="book" d="M 120 250 L 120 330 Q 250 340 250 360 Q 250 340 380 330 L 380 250" />
  
  <!-- Upward Blue Arrow -->
  <path class="arrow" d="M 250 180 L 225 240 L 242 240 L 242 340 L 258 340 L 258 240 L 275 240 Z" />

  <!-- Brain Outer Outlines Left Hemisphere -->
  <path class="brain-line" d="M 240 180 C 220 180 200 170 190 150 C 175 160 155 155 145 135 C 135 125 135 105 145 90 C 135 75 145 55 165 50 C 180 35 210 40 230 65 C 240 60 250 60 250 60" />
  <!-- Brain Inner Gyri Left -->
  <path class="brain-line" d="M 180 80 C 170 95 185 115 200 110 C 215 105 210 130 195 135 C 180 140 170 120 160 120" />
  <path class="brain-line" d="M 210 70 C 220 85 235 90 240 115" />

  <!-- Brain Outer Outlines Right Hemisphere -->
  <path class="brain-line" d="M 260 180 C 280 180 300 170 310 150 C 325 160 345 155 355 135 C 365 125 365 105 355 90 C 365 75 355 55 335 50 C 320 35 290 40 270 65 C 260 60 250 60 250 60" />
  <!-- Brain Inner Gyri Right -->
  <path class="brain-line" d="M 320 80 C 330 95 315 115 300 110 C 285 105 290 130 305 135 C 320 140 330 120 340 120" />
  <path class="brain-line" d="M 290 70 C 280 85 265 90 260 115" />

  <!-- Brand Typography -->
  <text x="75" y="440">
    <tspan class="text-behavior">Behavior </tspan>
    <tspan class="text-school">School</tspan>
  </text>
</svg>
